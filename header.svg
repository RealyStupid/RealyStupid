<svg width="100%" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: "Segoe UI", sans-serif;
      fill: white;
    }
    .title {
      font-size: 48px;
      font-weight: 600;
    }
    .subtitle {
      font-size: 22px;
      fill: #cccccc;
    }
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
    @keyframes blink {
      50% { border-color: transparent }
    }
    .typing {
      width: 0;
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid white;
      animation: typing 2.5s steps(30, end), blink .75s step-end infinite;
    }
  </style>

  <!-- Title -->
  <foreignObject x="0" y="20" width="900" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="text title typing">
      RealyStupid
    </div>
  </foreignObject>

  <!-- Subtitle -->
  <foreignObject x="0" y="80" width="900" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="text subtitle typing" style="animation-delay: 2.6s;">
      Discord Bot Developer & Unity Programmer
    </div>
  </foreignObject>
</svg>
