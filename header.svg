<svg width="100%" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">

  <!-- Title -->
  <text id="title" x="50%" y="45%" text-anchor="middle"
        font-family="Segoe UI" font-size="48" fill="white"
        stroke="white" stroke-width="1" stroke-dasharray="0 500">
    RealyStupid
    <animate attributeName="stroke-dasharray"
             from="0,500" to="500,0"
             dur="2s" fill="freeze" />
  </text>

  <!-- Subtitle -->
  <text id="subtitle" x="50%" y="80%" text-anchor="middle"
        font-family="Segoe UI" font-size="22" fill="#cccccc"
        stroke="#cccccc" stroke-width="1" stroke-dasharray="0 800">
    Discord Bot Developer & Unity Programmer
    <animate attributeName="stroke-dasharray"
             from="0,800" to="800,0"
             dur="2s" begin="2s" fill="freeze" />
  </text>

  <!-- Blinking Cursor -->
  <rect id="cursor" x="50%" y="50%" width="2" height="40" fill="white">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="0.8s"
             repeatCount="indefinite" />
  </rect>

</svg>
