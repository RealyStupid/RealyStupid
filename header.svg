<svg width="100%" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">

  <!-- Title -->
  <text x="50%" y="45%" text-anchor="middle"
        font-family="Segoe UI" font-size="48" fill="white"
        stroke="white" stroke-width="1" stroke-dasharray="500"
        stroke-dashoffset="500">
    RealyStupid
    <animate attributeName="stroke-dashoffset"
             from="500" to="0"
             dur="2s" fill="freeze" />
  </text>

  <!-- Subtitle -->
  <text x="50%" y="80%" text-anchor="middle"
        font-family="Segoe UI" font-size="22" fill="#cccccc"
        stroke="#cccccc" stroke-width="1" stroke-dasharray="800"
        stroke-dashoffset="800">
    Discord Bot Developer & Unity Programmer
    <animate attributeName="stroke-dashoffset"
             from="800" to="0"
             dur="2s" begin="2s" fill="freeze" />
  </text>

  <!-- Blinking Cursor -->
  <rect x="50%" y="50%" width="2" height="40" fill="white">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="0.8s"
             repeatCount="indefinite" />
  </rect>

</svg>
