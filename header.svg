<svg width="100%" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">

  <!-- Background (optional, remove if your README has a white background) -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Title Text -->
  <text x="50%" y="45%" text-anchor="middle" font-family="Segoe UI" font-size="48" fill="white">
    RealyStupid
    <animate attributeName="stroke-dasharray" from="0,200" to="200,0" dur="2s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="50%" y="80%" text-anchor="middle" font-family="Segoe UI" font-size="22" fill="#cccccc">
    Discord Bot Developer & Unity Programmer
    <animate attributeName="stroke-dasharray" from="0,400" to="400,0" dur="2s" begin="2s" fill="freeze"/>
  </text>

  <!-- Cursor -->
  <rect x="50%" y="50%" width="2" height="40" fill="white">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

</svg>
